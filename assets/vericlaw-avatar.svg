<svg width="1024" height="1024" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#13301d"/>
      <stop offset="55%" stop-color="#0b1a11"/>
      <stop offset="100%" stop-color="#050b08"/>
    </radialGradient>
    <linearGradient id="lime" x1="20%" y1="10%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#d4ff66"/>
      <stop offset="55%" stop-color="#9ee63f"/>
      <stop offset="100%" stop-color="#5fae1c"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="6" y="6" width="500" height="500" rx="116" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="218" fill="none" stroke="#9ee63f" stroke-opacity="0.16" stroke-width="2"/>

  <!-- claw rake accent, extending past the check tip -->
  <g stroke="url(#lime)" stroke-linecap="round" stroke-opacity="0.55">
    <line x1="392" y1="150" x2="434" y2="102" stroke-width="11"/>
    <line x1="409" y1="163" x2="451" y2="115" stroke-width="11"/>
    <line x1="426" y1="176" x2="468" y2="128" stroke-width="11"/>
  </g>

  <!-- hero check = verified -->
  <path d="M 150 266 L 226 338 L 372 168"
        fill="none" stroke="url(#lime)" stroke-width="42"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
